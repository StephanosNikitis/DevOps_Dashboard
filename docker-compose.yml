version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: devops_pg
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops_password
      POSTGRES_DB: devops_dashboard
    ports:
      - "5433:5432"          # Exposes Postgres on localhost:5433 (avoids local conflicts)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devops_redis
    ports:
      - "6379:6379"          # Exposes Redis on localhost:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:   # Persists your DB data across docker-compose restarts
  redis_data:
